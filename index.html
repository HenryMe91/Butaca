<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Butaca - Cine & Series</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎞️</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --rojo: #e50914; 
            --oro: #ffcc00; 
            --fondo: #0a0a0a; 
            --card: #181818; 
            --azul: #0071eb; 
            --verde: #46d369; 
            --gris-suave: #2f2f2f;
        }

        body { 
            background: var(--fondo); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* --- INTRO MEJORADA (SPLASH) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .intro-logo {
            color: var(--rojo);
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 10px;
            text-align: center;
            filter: drop-shadow(0 0 15px rgba(229, 9, 20, 0.4));
            animation: cinematicIntro 2.5s ease-in-out forwards;
        }
        .intro-logo i { color: var(--oro); margin-right: 15px; }
        
        @keyframes cinematicIntro {
            0% { transform: scale(0.7); opacity: 0; letter-spacing: 20px; filter: blur(10px); }
            40% { opacity: 1; filter: blur(0px); }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0; }
        }

        /* --- PANTALLA LOGIN --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fondo);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9998;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.8s ease;
        }
        .login-card {
            background: rgba(255,255,255,0.03);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .login-card h1 { color: var(--rojo); font-size: 24px; letter-spacing: 2px; margin-bottom: 5px; }
        .login-card p { color: #666; font-size: 13px; margin-bottom: 25px; }

        /* HEADER Y LOGO */
        header { 
            padding: 18px; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px);
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 100; 
        }
        .logo { color: var(--rojo); font-size: 20px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }
        .logo i { color: var(--oro); margin-right: 8px; }

        /* VISTAS Y PESTAÑAS */
        .view { display: none; padding: 20px; animation: viewIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes viewIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .type-selector { display: flex; background: rgba(255,255,255,0.03); margin: -20px -20px 20px; border-bottom: 1px solid var(--gris-suave); }
        .type-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; font-size: 11px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        .type-btn.active { color: white; border-bottom: 3px solid var(--rojo); }

        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { background: var(--gris-suave); color: #bbb; border: none; padding: 8px 18px; border-radius: 20px; font-size: 12px; white-space: nowrap; }
        .filter-btn.active { background: white; color: black; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; cursor: pointer; }
        .card-info { padding: 12px; text-align: center; }
        .movie-title { font-size: 12px; font-weight: 700; height: 32px; overflow: hidden; margin-bottom: 8px; }

        /* BOTONES */
        .btn-action { background: var(--rojo); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 11px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-visto-ok { background: var(--verde); display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-added { background: rgba(70, 211, 105, 0.1) !important; color: var(--verde) !important; border: 1px solid var(--verde); pointer-events: none; }

        /* NAV INFERIOR */
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #555; text-align: center; font-size: 10px; font-weight: 600; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--rojo); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; }

        /* MODALES MODERNOS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1c1c1e; width: 85%; max-width: 350px; border-radius: 24px; padding: 25px; text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 22px; color: #555; cursor: pointer; }
        .stars-container { display: flex; justify-content: center; gap: 12px; margin: 20px 0; font-size: 32px; color: #333; }
        .star.active { color: var(--oro); }

        /* PERFIL STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px 5px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-num { font-size: 22px; font-weight: 800; color: white; display: block; }
        .stat-label { font-size: 8px; color: #666; font-weight: 800; text-transform: uppercase; }

        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--rojo); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="intro-logo"><i class="fas fa-ticket-alt"></i>BUTACA</div>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h1>BUTACA</h1>
            <p>Tu cine personal te espera</p>
            <input type="text" id="user-name-input" placeholder="Nombre de usuario" autocomplete="off">
            <button class="btn-action" style="margin-top:20px; padding:15px; font-size:13px;" onclick="doLogin()">COMENZAR</button>
        </div>
    </div>

    <header><div class="logo"><i class="fas fa-ticket-alt"></i> BUTACA</div></header>

    <div id="view-home" class="view active">
        <div class="type-selector">
            <button class="type-btn active" onclick="switchHomeType('movie', this)">Películas</button>
            <button class="type-btn" onclick="switchHomeType('tv', this)">Series</button>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterBy(null, this)">Todo</button>
            <button class="filter-btn" onclick="filterBy(10751, this)">Infantil</button>
            <button class="filter-btn" onclick="filterBy(28, this)">Acción</button>
            <button class="filter-btn" onclick="filterBy(35, this)">Comedia</button>
            <button class="filter-btn" onclick="filterBy(27, this)">Terror</button>
            <button class="filter-btn" onclick="filterBy(878, this)">Sci-Fi</button>
        </div>
        <div id="trending-grid" class="grid"></div>
        <div id="home-loader" style="padding:20px; text-align:center; color:var(--rojo);"><i class="fas fa-spinner fa-spin"></i></div>
    </div>

    <div id="view-search" class="view">
        <div style="display:flex; gap:12px; margin-bottom:20px;">
            <input type="text" id="query-input" placeholder="Buscar título..." style="flex:1;">
            <button class="btn-action" style="width:auto; padding:0 20px; margin:0;" onclick="searchContent()">IR</button>
        </div>
        <div class="type-selector" id="search-selector" style="display:none;">
            <button class="type-btn active" id="search-movie-tab" onclick="switchSearchTab('movie')">Películas</button>
            <button class="type-btn" id="search-tv-tab" onclick="switchSearchTab('tv')">Series</button>
        </div>
        <div id="search-grid-movie" class="grid"></div>
        <div id="search-grid-tv" class="grid" style="display:none;"></div>
    </div>

    <div id="view-movies" class="view"><h2>🎬 Mis Películas</h2><div id="saved-movies-grid" class="grid"></div></div>
    <div id="view-series" class="view"><h2>📺 Mis Series</h2><div id="saved-series-grid" class="grid"></div></div>

    <div id="view-profile" class="view">
        <div class="profile-card">
            <div style="width:80px; height:80px; background:#111; border-radius:50%; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; font-size:35px; border:2px solid var(--rojo);">🕵️</div>
            <h3 id="p-name" style="margin:0;">Usuario</h3>
            <p id="p-rank" style="color:var(--oro); font-size:10px; font-weight:800; letter-spacing:1px; margin-top:5px;">ESPECTADOR</p>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-num" id="stat-movies-p">0</span><span class="stat-label">Pelis Pend.</span></div>
                <div class="stat-box"><span class="stat-num" id="stat-series-p">0</span><span class="stat-label">Series Pend.</span></div>
                <div class="stat-box"><span class="stat-num" id="stat-movies-v">0</span><span class="stat-label">Pelis Vistas</span></div>
                <div class="stat-box"><span class="stat-num" id="stat-series-v">0</span><span class="stat-label">Series Vistas</span></div>
            </div>
        </div>
        <button onclick="logout()" style="color:#444; background:none; border:none; width:100%; font-size:11px; margin-top:40px; font-weight:700;">CERRAR SESIÓN</button>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchView('view-home', this)"><i class="fas fa-home"></i>Inicio</div>
        <div class="nav-item" onclick="switchView('view-search', this)"><i class="fas fa-search"></i>Buscar</div>
        <div class="nav-item" onclick="switchView('view-movies', this)"><i class="fas fa-film"></i>Pelis</div>
        <div class="nav-item" onclick="switchView('view-series', this)"><i class="fas fa-tv"></i>Series</div>
        <div class="nav-item" onclick="switchView('view-profile', this)"><i class="fas fa-user-alt"></i>Perfil</div>
    </nav>

    <div id="statusModal" class="modal"><div class="modal-content" id="status-content"></div></div>
    <div id="rateModal" class="modal"><div class="modal-content" id="rate-content"></div></div>
    <div id="movieModal" class="modal"><div class="modal-content" id="modalBody"></div></div>

    <script>
        const API_KEY = 'e7803f371057b32d0d0664e165bf78f1';
        let currentItem = null, ratingTemp = 0;
        let currentPage = 1, currentGenre = null, currentType = 'movie';

        window.onload = () => {
            // SECUENCIA DE APERTURA
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    checkSession(); // Revisa si pedimos login o entramos directo
                }, 800);
            }, 2500);

            window.addEventListener('scroll', () => {
                if(document.getElementById('view-home').classList.contains('active')) {
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) loadTrending(currentGenre, false);
                }
            });
        };

        function checkSession() {
            if(!localStorage.getItem('butaca_user')) {
                document.getElementById('login-screen').style.display = 'flex';
            } else {
                updateProfile(); loadTrending(null, true); loadSaved();
            }
        }

        function doLogin() {
            const name = document.getElementById('user-name-input').value;
            if(name.length < 2) return alert("Por favor, ingresa un nombre.");
            localStorage.setItem('butaca_user', name);
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                updateProfile(); loadTrending(null, true); loadSaved();
            }, 500);
        }

        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            window.scrollTo(0,0);
            if(viewId === 'view-profile') updateProfile();
        }

        function switchHomeType(type, btn) {
            currentType = type;
            document.querySelectorAll('#view-home .type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadTrending(currentGenre, true);
        }

        async function loadTrending(genreId = null, reset = false) {
            if(reset) { currentPage = 1; document.getElementById('trending-grid').innerHTML = ""; }
            let base = currentType === 'movie' ? 'movie' : 'tv';
            let url = genreId 
                ? `https://api.themoviedb.org/3/discover/${base}?api_key=${API_KEY}&with_genres=${genreId}${(genreId === 35 || genreId === 878) ? '&without_genres=10751' : ''}&language=es-ES&sort_by=popularity.desc&page=${currentPage}`
                : `https://api.themoviedb.org/3/trending/${base}/day?api_key=${API_KEY}&language=es-ES&page=${currentPage}`;

            const resp = await fetch(url);
            const data = await resp.json();
            data.results.forEach(m => renderCard(m, document.getElementById('trending-grid'), 'search', base));
            currentPage++;
        }

        function filterBy(id, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGenre = id;
            loadTrending(id, true);
        }

        async function searchContent() {
            const q = document.getElementById('query-input').value;
            if(!q) return;
            const resp = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=es-ES`);
            const data = await resp.json();
            const gM = document.getElementById('search-grid-movie'), gT = document.getElementById('search-grid-tv');
            gM.innerHTML = ""; gT.innerHTML = "";
            data.results.forEach(item => {
                if(item.media_type === 'movie') renderCard(item, gM, 'search', 'movie');
                else if(item.media_type === 'tv') renderCard(item, gT, 'search', 'tv');
            });
            document.getElementById('search-selector').style.display = 'flex';
            switchSearchTab('movie');
        }

        function switchSearchTab(type) {
            document.getElementById('search-grid-movie').style.display = type === 'movie' ? 'grid' : 'none';
            document.getElementById('search-grid-tv').style.display = type === 'tv' ? 'grid' : 'none';
            document.getElementById('search-movie-tab').classList.toggle('active', type === 'movie');
            document.getElementById('search-tv-tab').classList.toggle('active', type === 'tv');
        }

        function renderCard(item, container, mode, forceType) {
            const poster = item.poster_path || item.p;
            const img = poster ? (poster.startsWith('http') ? poster : `https://image.tmdb.org/t/p/w500${poster}`) : 'https://via.placeholder.com/500x750?text=No+Poster';
            const title = item.title || item.name || item.t;
            const id = item.id, type = forceType || item.media_type || (item.name ? 'tv' : 'movie');
            
            let watched = JSON.parse(localStorage.getItem('butaca_watched')) || [];
            let seenItem = watched.find(x => x.id === id);
            const card = document.createElement('div');
            card.className = 'card';
            
            let btnHtml = "";
            if(mode === 'search') {
                btnHtml = `<button class="btn-action" onclick="saveItem(this, '${title.replace(/'/g,"")}', '${poster}', ${id}, '${type}')">+ AGREGAR</button>`;
            } else {
                if(seenItem) {
                    btnHtml = `<button class="btn-action btn-visto-ok" onclick="openStatus(${id}, '${type}', '${title.replace(/'/g,"")}', '${poster}')"><i class="fas fa-check-circle"></i> VISTA</button>
                               <div style="color:var(--oro); font-size:10px; margin-top:5px; text-align:center;">${'⭐'.repeat(seenItem.rating)}</div>`;
                } else {
                    btnHtml = `<button class="btn-action" style="background:var(--azul);" onclick="openStatus(${id}, '${type}', '${title.replace(/'/g,"")}', '${poster}')">PENDIENTE</button>`;
                }
            }
            card.innerHTML = `<img src="${img}" onclick="openDetails('${type}', ${id})"><div class="card-info"><div class="movie-title">${title}</div>${btnHtml}</div>`;
            container.appendChild(card);
        }

        async function openDetails(type, id) {
            const resp = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=es-ES&append_to_response=watch/providers`);
            const m = await resp.json();
            const plat = m['watch/providers']?.results?.CL?.flatrate?.map(p => p.provider_name).join(", ") || "No disponible en CL";
            document.getElementById('modalBody').innerHTML = `
                <span class="close-x" onclick="document.getElementById('movieModal').style.display='none'">&times;</span>
                <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" style="width:100%; border-radius:15px;">
                <h3 style="color:var(--rojo); margin:15px 0 5px;">${m.title || m.name}</h3>
                <p style="font-size:12px; color:#aaa; text-align:left;">${m.overview || 'Sin descripción.'}</p>
                <div style="background:#333; padding:10px; border-radius:10px; font-size:11px; margin-top:15px; border-left:4px solid var(--rojo); text-align:left;"><strong>📺 Dónde ver:</strong><br>${plat}</div>
                <a href="https://api.whatsapp.com/send?text=${encodeURIComponent('Recomendación: ' + (m.title || m.name))}" target="_blank" style="background:#25D366; color:white; padding:12px; border-radius:10px; display:block; margin-top:15px; text-decoration:none; font-size:13px; font-weight:800; text-align:center;"><i class="fab fa-whatsapp"></i> COMPARTIR</a>`;
            document.getElementById('movieModal').style.display = 'flex';
        }

        function saveItem(btn, t, poster, id, type) {
            const key = type === 'tv' ? 'butaca_series' : 'butaca_movies';
            let list = JSON.parse(localStorage.getItem(key)) || [];
            if(list.some(m => m.id === id)) return;
            list.push({t, p: poster, id, type});
            localStorage.setItem(key, JSON.stringify(list));
            btn.innerText = "✔️ AGREGADO"; btn.classList.add('btn-added');
            loadSaved();
        }

        function openStatus(id, type, t, poster) {
            currentItem = { id, type, t, p: poster };
            document.getElementById('status-content').innerHTML = `
                <span class="close-x" onclick="closeModals()">&times;</span>
                <h3 style="font-size:18px; margin-bottom:20px;">${t}</h3>
                <button class="btn-action" style="background:var(--verde); padding:15px;" onclick="goToRating()">MARCAR COMO VISTA</button>
                <button class="btn-action" style="background:none; border:1px solid #444; color:#666; margin-top:15px;" onclick="removeItem(${id}, '${type}')">BORRAR DE MI LISTA</button>`;
            document.getElementById('statusModal').style.display = 'flex';
        }

        function goToRating() {
            document.getElementById('statusModal').style.display = 'none';
            document.getElementById('rate-content').innerHTML = `
                <span class="close-x" onclick="closeModals()">&times;</span>
                <h3 style="margin-bottom:10px;">¿Tu Nota?</h3>
                <div class="stars-container">${[1,2,3,4,5].map(n => `<i class="fas fa-star star" onclick="setRating(${n}, this)"></i>`).join("")}</div>
                <button class="btn-action" style="background:var(--oro); color:black; padding:15px;" onclick="confirmWatch()">GUARDAR</button>`;
            document.getElementById('rateModal').style.display = 'flex';
        }

        function setRating(n, el) { ratingTemp = n; document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n)); }
        function confirmWatch() {
            let watched = JSON.parse(localStorage.getItem('butaca_watched')) || [];
            const idx = watched.findIndex(x => x.id === currentItem.id);
            if(idx > -1) watched[idx].rating = ratingTemp; else watched.push({...currentItem, rating: ratingTemp});
            localStorage.setItem('butaca_watched', JSON.stringify(watched));
            closeModals(); loadSaved(); updateProfile();
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function loadSaved() {
            const mG = document.getElementById('saved-movies-grid'), sG = document.getElementById('saved-series-grid');
            mG.innerHTML = ""; sG.innerHTML = "";
            (JSON.parse(localStorage.getItem('butaca_movies')) || []).forEach(m => renderCard(m, mG, 'saved', 'movie'));
            (JSON.parse(localStorage.getItem('butaca_series')) || []).forEach(s => renderCard(s, sG, 'saved', 'tv'));
        }

        function updateProfile() {
            document.getElementById('p-name').innerText = localStorage.getItem('butaca_user') || "Invitado";
            const watched = JSON.parse(localStorage.getItem('butaca_watched')) || [];
            const mList = JSON.parse(localStorage.getItem('butaca_movies')) || [];
            const sList = JSON.parse(localStorage.getItem('butaca_series')) || [];
            document.getElementById('stat-movies-p').innerText = mList.filter(m => !watched.some(w => w.id === m.id)).length;
            document.getElementById('stat-series-p').innerText = sList.filter(s => !watched.some(w => w.id === s.id)).length;
            document.getElementById('stat-movies-v').innerText = watched.filter(x => x.type === 'movie').length;
            document.getElementById('stat-series-v').innerText = watched.filter(x => x.type === 'tv').length;
        }

        function removeItem(id, type) {
            const key = type === 'tv' ? 'butaca_series' : 'butaca_movies';
            localStorage.setItem(key, JSON.stringify((JSON.parse(localStorage.getItem(key)) || []).filter(m => m.id !== id)));
            localStorage.setItem('butaca_watched', JSON.stringify((JSON.parse(localStorage.getItem('butaca_watched')) || []).filter(m => m.id !== id)));
            closeModals(); loadSaved(); updateProfile();
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
