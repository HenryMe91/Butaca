<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Butaca - Cine & Series</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Butaca">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rojo: #e50914; --oro: #ffcc00; --fondo: #0a0a0a; --card: #181818; --azul: #0071eb; --verde: #46d369; --gris: #2f2f2f; }
        
        body { 
            background: var(--fondo); color: white; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; height: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        /* Contenedor para simular scroll de App */
        .app-viewport { height: 100vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }

        /* INTRO */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: opacity 0.8s ease; }
        .intro-logo-container { text-align: center; animation: cinematicIntro 2.5s ease-in-out forwards; }
        .intro-logo-img { height: 80px; width: auto; margin-bottom: 15px; filter: drop-shadow(0 0 15px rgba(229, 9, 20, 0.4)); }
        @keyframes cinematicIntro { 0% { transform: scale(0.8); opacity: 0; filter: blur(10px); } 40% { opacity: 1; filter: blur(0px); } 100% { transform: scale(1.1); opacity: 0; } }

        /* LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9998; padding: 20px; box-sizing: border-box; }
        .login-card { background: rgba(255,255,255,0.03); padding: 50px 30px; border-radius: 30px; width: 100%; max-width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }

        /* HEADER */
        header { padding: 18px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100; }
        .logo-header { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .logo-header i { color: var(--oro); font-size: 22px; }
        .logo-header span { color: var(--rojo); font-size: 22px; font-weight: 900; letter-spacing: 2px; }

        .view { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* TABS & FILTROS */
        .type-selector { display: flex; background: rgba(255,255,255,0.03); margin: -20px -20px 20px; border-bottom: 1px solid var(--gris); }
        .type-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .type-btn.active { color: white; border-bottom: 3px solid var(--rojo); }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .filter-btn { background: var(--gris); color: #bbb; border: none; padding: 8px 18px; border-radius: 20px; font-size: 12px; white-space: nowrap; }
        .filter-btn.active { background: white; color: black; }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-title { font-size: 11px; font-weight: 700; height: 32px; overflow: hidden; line-height: 1.3; margin-bottom: 8px; }

        /* BOTONES - FEEDBACK VERDE */
        .btn-action { background: var(--rojo); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 10px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-added { background: var(--verde) !important; color: white !important; }
        .btn-exists { background: #333 !important; color: #777 !important; pointer-events: none; }
        .btn-visto-ok { background: var(--verde); }

        /* PERFIL CON AJUSTE DE FOTO */
        .profile-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); padding: 40px 20px; border-radius: 28px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
        .avatar-container-outer { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        .user-avatar-big { 
            width: 100%; height: 100%; background: #111; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 50px; border: 4px solid var(--rojo); 
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3); 
            cursor: pointer; position: relative; overflow: hidden; 
        }
        .user-avatar-big img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .edit-badge { position: absolute; bottom: 5px; right: 5px; background: var(--rojo); font-size: 10px; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--fondo); z-index: 10; }

        .photo-edit-panel { display: none; margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; }
        .stats-grid-profile { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .stat-box-profile { background: rgba(255,255,255,0.02); padding: 15px 5px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.04); }
        .stat-num-profile { font-size: 22px; font-weight: 800; display: block; }

        /* LISTAS DESPLEGABLES */
        .collection-item { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #222; background: rgba(255,255,255,0.02); }
        .collection-trigger { width: 100%; padding: 15px; background: none; border: none; color: var(--oro); font-weight: 800; font-size: 12px; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; text-transform: uppercase; }
        .collection-content { display: none; background: #000; border-top: 1px solid #222; }
        .collection-item.open .collection-content { display: block; }
        .sub-movie-item { border-bottom: 1px solid #111; }
        .sub-movie-header { padding: 15px; font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .sub-movie-details { display: none; padding: 15px; background: #0a0a0a; animation: fadeIn 0.3s; }
        .sub-movie-item.expanded .sub-movie-details { display: flex; gap: 15px; align-items: flex-start; }
        .sub-movie-img { width: 80px; border-radius: 8px; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 35px; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #555; text-align: center; font-size: 9px; font-weight: 700; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--rojo); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* MODALES */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1c1c1e; width: 85%; max-width: 350px; border-radius: 24px; padding: 25px; text-align: center; position: relative; overflow-y: auto; max-height: 85vh; border: 1px solid rgba(255,255,255,0.08); }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 22px; color: #555; cursor: pointer; }
        .btn-opt { background: rgba(255,255,255,0.04); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; margin-bottom: 12px; font-weight: 700; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        input[type="range"] { width: 100%; accent-color: var(--rojo); margin: 10px 0; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid #333; background: #111; color: white; outline: none; box-sizing: border-box; }
        .info-tag { background: #333; padding: 10px; border-radius: 10px; font-size: 11px; margin-top: 15px; border-left: 4px solid var(--rojo); text-align: left; }
    </style>
</head>
<body>

<div class="app-viewport">
    <div id="splash-screen">
        <div class="intro-logo-container">
            <img src="logo.png" class="intro-logo-img" alt="Logo">
            <div style="color:var(--rojo); font-weight:900; letter-spacing:5px;">BUTACA</div>
        </div>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <img src="logo.png" style="height:60px; margin-bottom:15px;">
            <h1>BUTACA</h1>
            <input type="text" id="user-name-input" placeholder="Tu nombre...">
            <button class="btn-action" style="margin-top:20px; padding:15px;" onclick="doLogin()">INGRESAR</button>
        </div>
    </div>

    <header><div class="logo-header"><i class="fas fa-ticket-alt"></i><span>BUTACA</span></div></header>

    <div id="view-home" class="view active">
        <div class="type-selector"><button class="type-btn active" onclick="switchHomeType('movie', this)">Películas</button><button class="type-btn" onclick="switchHomeType('tv', this)">Series</button></div>
        <div class="filter-bar"><button class="filter-btn active" onclick="filterBy(null, this)">Todo</button><button class="filter-btn" onclick="filterBy(10751, this)">Infantil</button><button class="filter-btn" onclick="filterBy(28, this)">Acción</button><button class="filter-btn" onclick="filterBy(35, this)">Comedia</button><button class="filter-btn" onclick="filterBy(27, this)">Terror</button><button class="filter-btn" onclick="filterBy(878, this)">Sci-Fi</button></div>
        <div id="trending-grid" class="grid"></div>
        <div id="home-loader" style="padding:20px; text-align:center; color:var(--rojo);"><i class="fas fa-spinner fa-spin"></i></div>
    </div>

    <div id="view-search" class="view">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="text" id="query-input" list="sugerencias" placeholder="Buscar título..." oninput="autoSuggest()" onkeydown="if(event.key==='Enter') searchContent()">
            <datalist id="sugerencias"></datalist>
            <button class="btn-action" style="width:auto; padding:0 20px;" onclick="searchContent()">IR</button>
        </div>
        <div class="type-selector" id="search-selector" style="display:none;"><button class="type-btn active" id="search-movie-tab" onclick="switchSearchTab('movie')">Películas</button><button class="type-btn" id="search-tv-tab" onclick="switchSearchTab('tv')">Series</button></div>
        <div id="search-grid-movie" class="grid"></div><div id="search-grid-tv" class="grid" style="display:none;"></div>
    </div>

    <div id="view-movies" class="view"><button class="btn-action" style="background:var(--gris); margin-bottom:25px;" onclick="createNewList('movie')">+ NUEVA LISTA</button><div id="movies-collections"></div><div id="saved-movies-grid" class="grid"></div></div>
    <div id="view-series" class="view"><button class="btn-action" style="background:var(--gris); margin-bottom:25px;" onclick="createNewList('tv')">+ NUEVA LISTA</button><div id="series-collections"></div><div id="saved-series-grid" class="grid"></div></div>

    <div id="view-profile" class="view">
        <div class="profile-card">
            <div class="avatar-container-outer">
                <div class="user-avatar-big" onclick="openAvatarSelector()"><div id="current-p-avatar">🕵️</div></div>
                <div class="edit-badge" onclick="openAvatarSelector()"><i class="fas fa-camera"></i></div>
            </div>
            
            <div id="photo-edit-panel" class="photo-edit-panel">
                <small style="color:#777; font-weight:800;">AJUSTAR FOTO</small>
                <input type="range" id="zoomRange" min="1" max="3" step="0.1" value="1" oninput="applyPhotoAjust()">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button class="btn-action" style="background:#222" onclick="movePhoto('y', -5)">Arriba</button>
                    <button class="btn-action" style="background:#222" onclick="movePhoto('y', 5)">Abajo</button>
                    <button class="btn-action" style="background:#222" onclick="movePhoto('x', -5)">Izq.</button>
                    <button class="btn-action" style="background:#222" onclick="movePhoto('x', 5)">Der.</button>
                </div>
            </div>

            <h3 id="p-name" style="margin:10px 0 0; font-size:22px;">Usuario</h3>
            <div class="stats-grid-profile">
                <div class="stat-box-profile"><span class="stat-num-profile" id="stat-movies-v">0</span><small style="font-size:8px; color:#666">PELIS VISTAS</small></div>
                <div class="stat-box-profile"><span class="stat-num-profile" id="stat-series-v">0</span><small style="font-size:8px; color:#666">SERIES VISTAS</small></div>
            </div>
        </div>
        <button onclick="logout()" style="color:#444; background:none; border:none; width:100%; font-size:11px; margin-top:40px; font-weight:700;">CERRAR SESIÓN</button>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchView('view-home', this)"><i class="fas fa-home"></i>Inicio</div>
        <div class="nav-item" onclick="switchView('view-search', this)"><i class="fas fa-search"></i>Buscar</div>
        <div class="nav-item" onclick="switchView('view-movies', this)"><i class="fas fa-film"></i>Pelis</div>
        <div class="nav-item" onclick="switchView('view-series', this)"><i class="fas fa-tv"></i>Series</div>
        <div class="nav-item" onclick="switchView('view-profile', this)"><i class="fas fa-user-alt"></i>Perfil</div>
    </nav>
</div>

    <div id="avatarModal" class="modal"><div class="modal-content"><span class="close-x" onclick="closeModals()">&times;</span><h3>Personalizar</h3><button class="btn-action" style="margin-bottom:20px;" onclick="document.getElementById('fileInput').click()">SUBIR FOTO PROPIA</button><input type="file" id="fileInput" hidden accept="image/*" onchange="uploadPhoto(this)"><div id="avatar-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"></div></div></div>
    <div id="statusModal" class="modal"><div class="modal-content" id="status-content"></div></div>
    <div id="rateModal" class="modal"><div class="modal-content"><span class="close-x" onclick="closeModals()">&times;</span><h3>Tu Nota</h3><div class="stars-container" id="stars-box"><i class="fas fa-star star" onclick="setRating(1)"></i><i class="fas fa-star star" onclick="setRating(2)"></i><i class="fas fa-star star" onclick="setRating(3)"></i><i class="fas fa-star star" onclick="setRating(4)"></i><i class="fas fa-star star" onclick="setRating(5)"></i></div><button class="btn-action" style="background:var(--oro); color:black; padding:15px;" onclick="confirmWatch()">GUARDAR CRÍTICA</button></div></div>
    <div id="moveModal" class="modal"><div class="modal-content"><h3>¿A qué lista?</h3><div id="lists-options"></div><button class="btn-action" style="background:var(--gris); margin-top:15px" onclick="createNewListAndMove()">+ NUEVA LISTA</button></div></div>
    <div id="movieModal" class="modal"><div class="modal-content" id="modalBody"></div></div>

    <script>
        const API_KEY = 'e7803f371057b32d0d0664e165bf78f1';
        let currentItem = null, ratingTemp = 0, currentPage = 1, currentGenre = null, currentType = 'movie';
        let photoAjust = { zoom: 1, x: 0, y: 0 };

        window.onload = () => {
            setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; checkSession(); }, 800); }, 2500);
            const vp = document.querySelector('.app-viewport');
            vp.addEventListener('scroll', () => { if(document.getElementById('view-home').classList.contains('active') && (vp.scrollTop + vp.clientHeight) >= vp.scrollHeight - 800) loadTrending(currentGenre, false); });
        };

        function checkSession() { if(!localStorage.getItem('butaca_user')) document.getElementById('login-screen').style.display = 'flex'; else { updateProfile(); loadTrending(null, true); loadSaved(); } }
        function doLogin() { const n = document.getElementById('user-name-input').value; if(n.length < 2) return; localStorage.setItem('butaca_user', n); localStorage.setItem('butaca_avatar', '🕵️'); document.getElementById('login-screen').style.display = 'none'; updateProfile(); loadTrending(null, true); loadSaved(); }

        /* --- FOTO Y EDICIÓN --- */
        function uploadPhoto(input) { if (input.files[0]) { const r = new FileReader(); r.onload = (e) => { localStorage.setItem('butaca_custom_photo', e.target.result); photoAjust = { zoom: 1, x: 0, y: 0 }; savePhotoSettings(); renderProfilePic(); closeModals(); }; r.readAsDataURL(input.files[0]); } }
        function applyPhotoAjust() { photoAjust.zoom = document.getElementById('zoomRange').value; const img = document.querySelector('#current-p-avatar img'); if(img) { img.style.transform = `scale(${photoAjust.zoom}) translate(${photoAjust.x}px, ${photoAjust.y}px)`; savePhotoSettings(); } }
        function movePhoto(axis, val) { photoAjust[axis] += val; applyPhotoAjust(); }
        function savePhotoSettings() { localStorage.setItem('butaca_photo_settings', JSON.stringify(photoAjust)); }
        function renderProfilePic() {
            const custom = localStorage.getItem('butaca_custom_photo'), avatar = localStorage.getItem('butaca_avatar') || "🕵️", container = document.getElementById('current-p-avatar'), saved = JSON.parse(localStorage.getItem('butaca_photo_settings'));
            if(saved) photoAjust = saved;
            if(custom) { container.innerHTML = `<img src="${custom}" style="transform: scale(${photoAjust.zoom}) translate(${photoAjust.x}px, ${photoAjust.y}px)">`; document.getElementById('photo-edit-panel').style.display = 'block'; document.getElementById('zoomRange').value = photoAjust.zoom; }
            else { container.innerHTML = avatar; document.getElementById('photo-edit-panel').style.display = 'none'; }
        }

        /* --- NAVEGACIÓN --- */
        function switchView(id, el) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); if(id === 'view-profile') updateProfile(); if(id === 'view-movies' || id === 'view-series') loadSaved(); }

        /* --- FUNCIONES CORE --- */
        async function autoSuggest() { const q = document.getElementById('query-input').value; if(q.length > 2) { const resp = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=es-ES`); const data = await resp.json(); document.getElementById('sugerencias').innerHTML = data.results.slice(0, 6).map(m => `<option value="${m.title || m.name}">`).join(""); } }
        async function searchContent() { const q = document.getElementById('query-input').value; if(!q) return; const resp = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(q)}&language=es-ES`); const data = await resp.json(); const gM = document.getElementById('search-grid-movie'), gT = document.getElementById('search-grid-tv'); gM.innerHTML = ""; gT.innerHTML = ""; data.results.forEach(item => { if(item.media_type === 'movie') renderCard(item, gM, 'search', 'movie'); else if(item.media_type === 'tv') renderCard(item, gT, 'search', 'tv'); }); document.getElementById('search-selector').style.display = 'flex'; switchSearchTab('movie'); }
        function saveItem(btn, t, poster, id, type) { const key = type === 'tv' ? 'butaca_series' : 'butaca_movies'; let list = JSON.parse(localStorage.getItem(key)) || []; list.push({t, p: poster, id, type}); localStorage.setItem(key, JSON.stringify(list)); btn.innerText = "✔️ AGREGADO"; btn.classList.add('btn-added'); updateProfile(); }
        function isAlreadySaved(id, type) { const bK = type === 'tv' ? 'butaca_series' : 'butaca_movies', lK = type === 'tv' ? 'butaca_lists_series' : 'butaca_lists_movies'; if((JSON.parse(localStorage.getItem(bK)) || []).some(m => m.id === id)) return true; for(let l of (JSON.parse(localStorage.getItem(lK)) || [])) { if(l.items.some(i => i.id === id)) return true; } return false; }
        
        function renderCard(item, container, mode, forceType) {
            const poster = item.poster_path || item.p, img = poster ? (poster.startsWith('http') ? poster : `https://image.tmdb.org/t/p/w500${poster}`) : 'https://via.placeholder.com/500x750', title = item.title || item.name || item.t, id = item.id, type = forceType || item.media_type || (item.name ? 'tv' : 'movie'), card = document.createElement('div'); card.className = 'card';
            let isSaved = isAlreadySaved(id, type), seen = (JSON.parse(localStorage.getItem('butaca_watched')) || []).find(x => x.id === id), btnHtml = "";
            if(mode === 'search') { if(isSaved) btnHtml = `<button class="btn-action btn-added">YA EN TU LISTA</button>`; else btnHtml = `<button class="btn-action" onclick="saveItem(this, '${title.replace(/'/g,"")}', '${poster}', ${id}, '${type}')">+ AGREGAR</button>`; }
            else { if(seen) btnHtml = `<button class="btn-action btn-visto-ok" onclick="openStatus(${id}, '${type}', '${title.replace(/'/g,"")}', '${poster}')">✔️ VISTA</button>`; else btnHtml = `<button class="btn-action btn-status" style="background:var(--azul)" onclick="openStatus(${id}, '${type}', '${title.replace(/'/g,"")}', '${poster}')">PENDIENTE</button>`; }
            card.innerHTML = `<img src="${img}" onclick="openDetails('${type}', ${id})"><div class="card-info"><div class="movie-title">${title}</div>${btnHtml}</div>`; container.appendChild(card);
        }

        async function openDetails(type, id) { const resp = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=es-ES&append_to_response=watch/providers`); const m = await resp.json(); const providers = m['watch/providers']?.results?.CL?.flatrate || []; let plat = providers.map(p => p.provider_name).join(", "); if(!plat) plat = (type === 'movie' && m.status === 'Released') ? "🍿 Disponible solo en Cines" : "No disponible"; document.getElementById('modalBody').innerHTML = `<span class="close-x" onclick="closeModals()">&times;</span><img src="https://image.tmdb.org/t/p/w500${m.poster_path}" style="width:100%; border-radius:18px;"><h3>${m.title || m.name}</h3><p style="font-size:12px; color:#aaa; text-align:left;">${m.overview || 'Sin sinopsis.'}</p><div class="info-tag"><strong>📺 Dónde ver:</strong><br>${plat}</div><a href="https://api.whatsapp.com/send?text=${encodeURIComponent('Recomendación: ' + (m.title || m.name))}" target="_blank" style="background:#25D366; color:white; padding:12px; border-radius:10px; display:block; margin-top:15px; text-decoration:none; font-size:13px; font-weight:800; text-align:center;"><i class="fab fa-whatsapp"></i> COMPARTIR</a>`; document.getElementById('movieModal').style.display = 'flex'; }
        function loadSaved() { const mG = document.getElementById('saved-movies-grid'), sG = document.getElementById('saved-series-grid'); mG.innerHTML = ""; sG.innerHTML = ""; (JSON.parse(localStorage.getItem('butaca_movies')) || []).forEach(m => renderCard(m, mG, 'saved', 'movie')); (JSON.parse(localStorage.getItem('butaca_series')) || []).forEach(s => renderCard(s, sG, 'saved', 'tv')); renderSubCollections('movie', 'movies-collections'); renderSubCollections('tv', 'series-collections'); }
        function renderSubCollections(type, containerId) { const k = type === 'movie' ? 'butaca_lists_movies' : 'butaca_lists_series', lists = JSON.parse(localStorage.getItem(k)) || [], container = document.getElementById(containerId); container.innerHTML = ""; lists.forEach((list, index) => { let html = `<div class="collection-item" id="col-${type}-${index}"><button class="collection-trigger" onclick="toggleCollection('col-${type}-${index}')"><span><i class="fas fa-folder"></i> ${list.name} (${list.items.length})</span><i class="fas fa-chevron-down"></i></button><div class="collection-content">`; list.items.forEach((item, itemIdx) => { html += `<div class="sub-movie-item" id="sub-${type}-${index}-${itemIdx}"><div class="sub-movie-header" onclick="expandMovie('sub-${type}-${index}-${itemIdx}')">${item.t} <i class="fas fa-chevron-right"></i></div><div class="sub-movie-details"><img src="${item.p ? (item.p.startsWith('http') ? item.p : 'https://image.tmdb.org/t/p/w500'+item.p) : ''}" class="sub-movie-img"><div class="sub-movie-actions"><button class="btn-action" style="margin-bottom:8px" onclick="openStatus(${item.id}, '${type}', '${item.t}', '${item.p}')">OPCIONES</button><button class="btn-action" style="background:none; border:1px solid #333; color:#666" onclick="removeItem(${item.id}, '${type}')">QUITAR</button></div></div></div>`; }); html += `</div></div>`; container.innerHTML += html; }); }
        function toggleCollection(id) { document.getElementById(id).classList.toggle('open'); }
        function expandMovie(id) { document.querySelectorAll('.sub-movie-item').forEach(x => { if(x.id !== id) x.classList.remove('expanded'); }); document.getElementById(id).classList.toggle('expanded'); }
        function updateProfile() { document.getElementById('p-name').innerText = localStorage.getItem('butaca_user') || "Usuario"; renderProfilePic(); const watched = JSON.parse(localStorage.getItem('butaca_watched')) || []; document.getElementById('stat-movies-v').innerText = watched.filter(x => x.type === 'movie').length; document.getElementById('stat-series-v').innerText = watched.filter(x => x.type === 'tv').length; }
        function openStatus(id, type, t, poster) { currentItem = { id, type, t, p: poster }; document.getElementById('status-content').innerHTML = `<span class="close-x" onclick="closeModals()">&times;</span><h3>${t}</h3><button class="btn-opt" style="background:var(--verde);" onclick="goToRating()">Marcar vista</button><button class="btn-opt" onclick="openMoveToList()">Mover a lista</button><button class="btn-opt" style="color:var(--rojo);" onclick="removeItemConfirm()">Quitar</button>`; document.getElementById('statusModal').style.display = 'flex'; }
        function setRating(n) { ratingTemp = n; document.querySelectorAll('#stars-box .star').forEach((s, i) => s.classList.toggle('active', i < n)); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function logout() { localStorage.clear(); location.reload(); }
        function switchHomeType(t, b) { currentType = t; document.querySelectorAll('#view-home .type-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); loadTrending(currentGenre, true); }
        function filterBy(id, btn) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentGenre = id; loadTrending(id, true); }
        function switchSearchTab(t) { document.getElementById('search-grid-movie').style.display = t === 'movie' ? 'grid' : 'none'; document.getElementById('search-grid-tv').style.display = t === 'tv' ? 'grid' : 'none'; document.getElementById('search-movie-tab').classList.toggle('active', t === 'movie'); document.getElementById('search-tv-tab').classList.toggle('active', t === 'tv'); }
        function openAvatarSelector() { const icons = ['🕵️','👽','🦸','🧛','🤖','🎬','👨‍🚀','👻']; document.getElementById('avatar-grid').innerHTML = icons.map(i => `<div class="avatar-opt" onclick="updateAvatar('${i}')" style="font-size:28px; padding:10px; background:rgba(255,255,255,0.05); border-radius:12px; cursor:pointer; text-align:center;">${i}</div>`).join(""); document.getElementById('avatarModal').style.display = 'flex'; }
        function updateAvatar(icon) { localStorage.setItem('butaca_avatar', icon); localStorage.removeItem('butaca_custom_photo'); renderProfilePic(); closeModals(); }
        async function loadTrending(genreId = null, reset = false) { if(reset) { currentPage = 1; document.getElementById('trending-grid').innerHTML = ""; } let url = genreId ? `https://api.themoviedb.org/3/discover/${currentType}?api_key=${API_KEY}&with_genres=${genreId}${(genreId === 35 || genreId === 878) ? '&without_genres=10751' : ''}&language=es-ES&sort_by=popularity.desc&page=${currentPage}` : `https://api.themoviedb.org/3/trending/${currentType}/day?api_key=${API_KEY}&language=es-ES&page=${currentPage}`; const resp = await fetch(url); const data = await resp.json(); data.results.forEach(m => renderCard(m, document.getElementById('trending-grid'), 'search', currentType)); currentPage++; }
    </script>
</body>
